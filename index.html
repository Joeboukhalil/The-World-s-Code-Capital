<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RGB Cube Interactive</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
    color: white;
    touch-action: none;
    display: flex;
    flex-direction: column;
}

/* TOP TEXT */
#info {
    width: 100%;
    height: 35vh;
    overflow: auto;
    background: rgba(0, 0, 0, 0.75);
    padding: 20px;
    box-sizing: border-box;
    font-size: 13px;
    line-height: 1.5;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 10;
}

/* BOTTOM SCENE */
#scene {
    width: 100%;
    height: 65vh;
    perspective: 1000px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: grab;
}
#scene:active {
    cursor: grabbing;
}

/* CUBE CONTAINER */
#cube {
    position: relative;
    width: 200px;
    height: 200px;
    transform-style: preserve-3d;
    transform: rotateX(-25deg) rotateY(35deg);
}

/* CUBE FACES */
.face {
    position: absolute;
    width: 200px;
    height: 200px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-sizing: border-box;
    backface-visibility: visible;
}

/* 3D Positioning of Faces */
.front  { transform: rotateY(  0deg) translateZ(100px); }
.back   { transform: rotateY(180deg) translateZ(100px); }
.right  { transform: rotateY( 90deg) translateZ(100px); }
.left   { transform: rotateY(-90deg) translateZ(100px); }
.top    { transform: rotateX( 90deg) translateZ(100px); }
.bottom { transform: rotateX(-90deg) translateZ(100px); }

/* MOBILE FIX */
@media (max-width: 700px) {
    #info { height: 40vh; }
    #scene { height: 60vh; }
}
</style>
</head>
<body>

<div id="info">
    <b>RGB Cube Visualization</b><br><br>
    This cube represents the RGB color system in 3D space where every color is formed using Red, Green, and Blue values (0–255).<br><br>
    <b>Axis Mapping:</b><br>
    • Left to Right = <b>Red</b><br>
    • Bottom to Top = <b>Green</b><br>
    • Back to Front = <b>Blue</b><br><br>
    <b>Controls:</b> Drag to rotate. Scroll / Pinch to zoom.
</div>

<div id="scene">
    <div id="cube">
        <canvas id="front" class="face front"></canvas>
        <canvas id="back" class="face back"></canvas>
        <canvas id="right" class="face right"></canvas>
        <canvas id="left" class="face left"></canvas>
        <canvas id="top" class="face top"></canvas>
        <canvas id="bottom" class="face bottom"></canvas>
    </div>
</div>

<script>
const cube = document.getElementById("cube");
const faceSize = 200;

// Helper to draw color gradients pixel-by-pixel onto a face canvas
function generateFace(canvasId, getRGB) {
    const canvas = document.getElementById(canvasId);
    canvas.width = faceSize;
    canvas.height = faceSize;
    const ctx = canvas.getContext('2d');
    const imgData = ctx.createImageData(faceSize, faceSize);

    for (let y = 0; y < faceSize; y++) {
        for (let x = 0; x < faceSize; x++) {
            // Normalize x and y to 0-255 spectrum
            const u = Math.round((x / (faceSize - 1)) * 255);
            const v = Math.round((y / (faceSize - 1)) * 255);
            
            const [r, g, b] = getRGB(u, v);
            
            const index = (y * faceSize + x) * 4;
            imgData.data[index]     = r;   // R
            imgData.data[index + 1] = g;   // G
            imgData.data[index + 2] = b;   // B
            imgData.data[index + 3] = 255; // Alpha
        }
    }
    ctx.putImageData(imgData, 0, 0);
}

/* Map coordinates to RGB values depending on the face orientation.
  Origin (0,0,0) is at the Back-Bottom-Left (Black).
*/
// Front Face: Blue = 255 constant
generateFace('front',  (x, y) => [x, 255 - y, 255]); 
// Back Face: Blue = 0 constant
generateFace('back',   (x, y) => [255 - x, 255 - y, 0]); 
// Right Face: Red = 255 constant
generateFace('right',  (x, y) => [255, 255 - y, 255 - x]); 
// Left Face: Red = 0 constant
generateFace('left',   (x, y) => [0, 255 - y, x]); 
// Top Face: Green = 255 constant
generateFace('top',    (x, y) => [x, 255, y]); 
// Bottom Face: Green = 0 constant
generateFace('bottom', (x, y) => [x, 0, 255 - y]); 

/* ROTATION + ZOOM LOGIC */
let rotX = -25;
let rotY = 35;
let zoom = 1;

function render() {
    cube.style.transform = `scale(${zoom}) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
}
render();

/* MOUSE DRAG */
let dragging = false;
let lastX = 0;
let lastY = 0;

document.addEventListener("mousedown", (e) => {
    // Only drag if clicking inside the scene container
    if (!e.target.closest('#scene')) return;
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
});

document.addEventListener("mouseup", () => dragging = false);

document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    rotY += (e.clientX - lastX) * 0.4;
    rotX -= (e.clientY - lastY) * 0.4;
    lastX = e.clientX;
    lastY = e.clientY;
    render();
});

/* TOUCH DRAG (MOBILE) */
let touchDragging = false;
let tLastX = 0;
let tLastY = 0;

document.addEventListener("touchstart", (e) => {
    if (e.touches.length === 1 && e.target.closest('#scene')) {
        touchDragging = true;
        tLastX = e.touches[0].clientX;
        tLastY = e.touches[0].clientY;
    }
});

document.addEventListener("touchend", () => touchDragging = false);

document.addEventListener("touchmove", (e) => {
    if (!touchDragging || e.touches.length !== 1) return;
    const t = e.touches[0];
    rotY += (t.clientX - tLastX) * 0.5;
    rotX -= (t.clientY - tLastY) * 0.5;
    tLastX = t.clientX;
    tLastY = t.clientY;
    render();
});

/* ZOOM (WHEEL & PINCH) */
document.addEventListener("wheel", (e) => {
    if (!e.target.closest('#scene')) return;
    zoom += e.deltaY * -0.001;
    zoom = Math.max(0.4, Math.min(2.5, zoom));
    render();
}, { passive: true });

let initialDist = null;
document.addEventListener("touchmove", (e) => {
    if (e.touches.length === 2 && e.target.closest('#scene')) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (initialDist !== null) {
            zoom *= dist / initialDist;
            zoom = Math.max(0.4, Math.min(2.5, zoom));
            render();
        }
        initialDist = dist;
    }
});
document.addEventListener("touchend", () => initialDist = null);
</script>

</body>
</html>
